en:
  site_settings:
    resenha_enabled: "Enable the Resenha voice rooms plugin."
    resenha_allowed_groups: "Groups that can access voice rooms."
    resenha_create_room_allowed_groups: "Groups that can create new voice rooms."
    resenha_max_rooms_per_user: "Maximum number of voice rooms a single user can own."
    resenha_participant_ttl_seconds: "Seconds to keep active speaker presence in Redis before automatic cleanup. Client heartbeat refreshes every 10 seconds."
    resenha_noise_suppression: "Enable DTLN-based noise suppression for voice rooms. When enabled, users can toggle noise suppression to filter background noise from their microphone audio."
    resenha_idle_threshold_minutes: "Minutes of inactivity before a voice room participant is marked as idle. Set to 0 to disable."
    resenha_afk_auto_mute_threshold_minutes: "Minutes of inactivity before a voice room participant is automatically muted. Set to 0 to disable."
    resenha_afk_disconnect_threshold_minutes: "Minutes of inactivity before a voice room participant is automatically disconnected. Set to 0 to disable."
  resenha:
    defaults:
      watercooler_description: "Join for casual drop-in voice chats with other community members."
    errors:
      not_enabled: "Resenha voice rooms are disabled."
      not_authorized: "You are not allowed to perform that action for this room."
      room_limit: "You reached the maximum number of rooms you can create."
      missing_payload: "Signal payload is required."
      cannot_kick_self: "You cannot kick yourself from the room."
      cannot_kick_creator: "You cannot kick the room creator."
      listeners_cannot_unmute: "Listeners cannot unmute in a Stage room."
