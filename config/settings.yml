plugins:
  resenha_enabled:
    default: false
    client: true
  resenha_allowed_groups:
    type: group_list
    list_type: compact
    default: "0"
    allow_any: false
    refresh: true
  resenha_create_room_allowed_groups:
    type: group_list
    list_type: compact
    default: "1|2|12"
    allow_any: false
    refresh: true
  resenha_max_rooms_per_user:
    default: 5
  resenha_participant_ttl_seconds:
    default: 30
  resenha_stun_servers:
    default: "stun:stun.l.google.com:19302|stun:global.stun.twilio.com:3478"
    client: true
  resenha_turn_servers:
    default: ""
    client: true
  resenha_turn_username:
    default: ""
    client: true
  resenha_turn_credential:
    default: ""
    client: true
    secret: true
  resenha_noise_suppression:
    default: false
    client: true
  resenha_idle_threshold_minutes:
    default: 5
    min: 0
    max: 60
    client: true
  resenha_afk_auto_mute_threshold_minutes:
    default: 15
    min: 0
    max: 120
    client: true
  resenha_afk_disconnect_threshold_minutes:
    default: 30
    min: 0
    max: 240
    client: true
  resenha_auto_status_enabled:
    default: true
    client: true
  resenha_badges_enabled:
    default: false
  resenha_analytics_enabled:
    default: true
  resenha_session_retention_days:
    default: 400
    min: 7
    max: 3650
